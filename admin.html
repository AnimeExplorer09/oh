<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuffie Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;900&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #060608;
            background-image: radial-gradient(circle at center, #2b0404 0%, #060608 100%);
            font-family: 'Noto Sans JP', sans-serif;
            color: #ffffff;
            min-height: 100vh;
            padding: 24px 16px 60px;
        }

        .container {
            max-width: 640px;
            margin: 0 auto;
        }

        h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.4rem;
            letter-spacing: 1px;
            text-shadow: 1px 1px 0px #b5893d;
        }

        .subtitle {
            font-size: 0.7rem;
            color: #94a3b8;
            margin-top: 4px;
            letter-spacing: 1px;
        }

        /* --- LOGIN --- */
        #login-screen {
            max-width: 320px;
            margin: 80px auto 0;
            text-align: center;
        }

        #login-screen input {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(181, 137, 61, 0.3);
            border-radius: 6px;
            padding: 10px 12px;
            color: #fff;
            font-size: 0.8rem;
            margin-top: 10px;
            outline: none;
        }

        #login-screen input:focus {
            border-color: #b5893d;
        }

        #login-btn {
            margin-top: 16px;
            width: 100%;
            background: transparent;
            border: 1px solid #b5893d;
            color: #b5893d;
            padding: 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        #login-btn:hover {
            background: #b5893d;
            color: #060608;
        }

        .login-divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 18px 0;
            font-size: 0.6rem;
            color: #475569;
            letter-spacing: 1px;
        }

        .login-divider::before,
        .login-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.1);
        }

        #github-login-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        #github-login-btn:hover {
            border-color: #b5893d;
            background: rgba(181, 137, 61, 0.1);
        }

        #login-error {
            margin-top: 10px;
            font-size: 0.65rem;
            color: #ef4444;
            min-height: 14px;
        }

        /* --- DASHBOARD --- */
        #dashboard { display: none; }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #logout-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: #94a3b8;
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 0.6rem;
            letter-spacing: 1px;
            cursor: pointer;
        }

        #logout-btn:hover { border-color: #ef4444; color: #ef4444; }

        .card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(181, 137, 61, 0.2);
            border-radius: 10px;
            padding: 18px;
            margin-top: 24px;
        }

        .card h2 {
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #b5893d;
            margin-bottom: 14px;
        }

        .stat-row {
            display: flex;
            gap: 24px;
        }

        .stat-block .num {
            font-size: 1.6rem;
            font-weight: 900;
            font-family: 'Syncopate', sans-serif;
        }

        .stat-block .label {
            font-size: 0.6rem;
            color: #94a3b8;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        .msg-item {
            border-bottom: 1px solid rgba(255,255,255,0.06);
            padding: 12px 0;
            display: flex;
            justify-content: space-between;
            gap: 12px;
        }

        .msg-item:last-child { border-bottom: none; }

        .msg-name {
            font-size: 0.75rem;
            font-weight: 700;
        }

        .msg-email {
            font-size: 0.6rem;
            color: #b5893d;
            font-family: monospace;
        }

        .msg-text {
            font-size: 0.7rem;
            color: #cbd5e1;
            margin-top: 6px;
            line-height: 1.5;
        }

        .msg-date {
            font-size: 0.55rem;
            color: #475569;
            margin-top: 6px;
        }

        .msg-delete {
            background: transparent;
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #ef4444;
            border-radius: 14px;
            padding: 4px 10px;
            font-size: 0.55rem;
            cursor: pointer;
            height: fit-content;
            white-space: nowrap;
        }

        .msg-delete:hover { background: #ef4444; color: #fff; }

        .empty-note {
            font-size: 0.7rem;
            color: #475569;
            text-align: center;
            padding: 20px 0;
        }

        .field-row { margin-top: 12px; }

        .field-row label {
            display: block;
            font-size: 0.6rem;
            color: #94a3b8;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .field-row input,
        .field-row textarea {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(181, 137, 61, 0.25);
            border-radius: 6px;
            padding: 8px 10px;
            color: #fff;
            font-size: 0.75rem;
            font-family: 'Noto Sans JP', sans-serif;
            outline: none;
        }

        .field-row input:focus,
        .field-row textarea:focus { border-color: #b5893d; }

        .field-row textarea { min-height: 60px; resize: vertical; }

        #save-profile-btn {
            margin-top: 16px;
            background: transparent;
            border: 1px solid #b5893d;
            color: #b5893d;
            padding: 8px 22px;
            border-radius: 20px;
            font-size: 0.65rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
        }

        #save-profile-btn:hover { background: #b5893d; color: #060608; }

        #save-status {
            margin-top: 8px;
            font-size: 0.6rem;
            color: #4ade80;
            min-height: 14px;
        }

        .config-warning {
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            padding: 14px;
            font-size: 0.7rem;
            color: #fca5a5;
            line-height: 1.6;
            margin-top: 20px;
        }

        /* --- AVATAR UPLOAD --- */
        .avatar-preview {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(181, 137, 61, 0.4);
            display: block;
            margin: 0 auto 12px;
            background: rgba(255,255,255,0.03);
        }

        .file-input-wrap {
            display: flex;
            justify-content: center;
        }

        .file-input-wrap input[type="file"] {
            font-size: 0.65rem;
            color: #94a3b8;
        }

        .upload-progress {
            margin-top: 8px;
            font-size: 0.6rem;
            color: #b5893d;
            text-align: center;
            min-height: 14px;
        }

        /* --- LIST CMS (devlog / testimonials) --- */
        .cms-list-item {
            border: 1px solid rgba(181, 137, 61, 0.15);
            border-radius: 6px;
            padding: 10px;
            margin-top: 10px;
        }

        .cms-list-item .field-row { margin-top: 8px; }
        .cms-list-item .field-row:first-child { margin-top: 0; }

        .cms-remove-btn {
            margin-top: 8px;
            background: transparent;
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #ef4444;
            border-radius: 14px;
            padding: 4px 12px;
            font-size: 0.55rem;
            cursor: pointer;
        }

        .cms-remove-btn:hover { background: #ef4444; color: #fff; }

        .cms-add-btn {
            margin-top: 12px;
            background: transparent;
            border: 1px dashed rgba(181, 137, 61, 0.5);
            color: #b5893d;
            border-radius: 6px;
            padding: 8px;
            width: 100%;
            font-size: 0.65rem;
            letter-spacing: 1px;
            cursor: pointer;
        }

        .cms-add-btn:hover { background: rgba(181, 137, 61, 0.08); }

        /* --- MESSAGE TOOLBAR --- */
        .msg-toolbar {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
        }

        .msg-toolbar input {
            flex: 1;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(181, 137, 61, 0.25);
            border-radius: 6px;
            padding: 7px 10px;
            color: #fff;
            font-size: 0.7rem;
            outline: none;
        }

        .msg-toolbar button {
            background: transparent;
            border: 1px solid rgba(181, 137, 61, 0.4);
            color: #b5893d;
            border-radius: 6px;
            padding: 7px 12px;
            font-size: 0.6rem;
            letter-spacing: 0.5px;
            cursor: pointer;
            white-space: nowrap;
        }

        .msg-toolbar button:hover { background: rgba(181, 137, 61, 0.15); }

        .msg-actions {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .msg-reply {
            background: transparent;
            border: 1px solid rgba(74, 222, 128, 0.4);
            color: #4ade80;
            border-radius: 14px;
            padding: 4px 10px;
            font-size: 0.55rem;
            cursor: pointer;
        }

        .msg-reply:hover { background: #4ade80; color: #060608; }

        .msg-unread-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #ef4444;
            display: inline-block;
            margin-right: 6px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>YUFFIE ADMIN</h1>
        <div class="subtitle">Portfolio control panel</div>

        <div id="config-check"></div>

        <!-- LOGIN -->
        <div id="login-screen">
            <input type="email" id="login-email" placeholder="Email" autocomplete="username">
            <input type="password" id="login-password" placeholder="Password" autocomplete="current-password">
            <button id="login-btn">Login</button>
            <div id="login-error"></div>

            <div class="login-divider">OR</div>

            <button id="github-login-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5C5.65.5.5 5.65.5 12c0 5.08 3.29 9.39 7.86 10.91.58.1.79-.25.79-.56 0-.28-.01-1.02-.02-2-3.2.7-3.88-1.54-3.88-1.54-.52-1.33-1.28-1.69-1.28-1.69-1.04-.71.08-.7.08-.7 1.16.08 1.77 1.19 1.77 1.19 1.02 1.76 2.68 1.25 3.34.95.1-.74.4-1.25.72-1.54-2.55-.29-5.24-1.28-5.24-5.7 0-1.26.45-2.29 1.19-3.09-.12-.29-.52-1.46.11-3.05 0 0 .97-.31 3.18 1.18a11 11 0 0 1 5.79 0c2.21-1.49 3.18-1.18 3.18-1.18.63 1.59.23 2.76.11 3.05.74.8 1.19 1.83 1.19 3.09 0 4.43-2.7 5.41-5.26 5.69.41.36.78 1.06.78 2.15 0 1.55-.01 2.8-.01 3.18 0 .31.21.67.8.56A10.52 10.52 0 0 0 23.5 12c0-6.35-5.15-11.5-11.5-11.5Z"/></svg>
                Continue with GitHub
            </button>
        </div>

        <!-- DASHBOARD -->
        <div id="dashboard">
            <div class="top-bar">
                <div class="subtitle" id="welcome-text">Welcome back</div>
                <button id="logout-btn">Logout</button>
            </div>

            <div class="card">
                <h2>Overview</h2>
                <div class="stat-row">
                    <div class="stat-block">
                        <div class="num" id="stat-visitors">—</div>
                        <div class="label">Total Visitors</div>
                    </div>
                    <div class="stat-block">
                        <div class="num" id="stat-messages">—</div>
                        <div class="label">Messages</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <h2>Edit Profile</h2>
                <div class="field-row">
                    <label>Name</label>
                    <input type="text" id="edit-name" placeholder="YOUR NAME">
                </div>
                <div class="field-row">
                    <label>Role</label>
                    <input type="text" id="edit-role" placeholder="Full-Stack Developer">
                </div>
                <div class="field-row">
                    <label>About</label>
                    <textarea id="edit-about" placeholder="Short bio..."></textarea>
                </div>
                <div class="field-row">
                    <label>Now Building (status badge)</label>
                    <input type="text" id="edit-building" placeholder="Now Building: Project Name">
                </div>
                <button id="save-profile-btn">Save Changes</button>
                <div id="save-status"></div>
            </div>

            <div class="card">
                <h2>Social Links</h2>
                <div class="field-row">
                    <label>Email</label>
                    <input type="email" id="edit-email" placeholder="you@example.com">
                </div>
                <div class="field-row">
                    <label>GitHub URL</label>
                    <input type="text" id="edit-github" placeholder="https://github.com/yourname">
                </div>
                <div class="field-row">
                    <label>Twitter / X URL</label>
                    <input type="text" id="edit-twitter" placeholder="https://x.com/yourname">
                </div>
                <div class="field-row">
                    <label>Instagram URL</label>
                    <input type="text" id="edit-instagram" placeholder="https://instagram.com/yourname">
                </div>
                <button id="save-links-btn">Save Changes</button>
                <div id="save-links-status"></div>
            </div>

            <div class="card">
                <h2>Skills</h2>
                <div class="field-row">
                    <label>Skill Tags (comma separated)</label>
                    <input type="text" id="edit-skills" placeholder="Flutter, Python, Firebase, Gemini API, React">
                </div>
                <button id="save-skills-btn">Save Changes</button>
                <div id="save-skills-status"></div>
            </div>

            <div class="card">
                <h2>Stats</h2>
                <div class="field-row">
                    <label>Projects Count</label>
                    <input type="number" id="edit-stat-projects" placeholder="12">
                </div>
                <div class="field-row">
                    <label>Years</label>
                    <input type="number" id="edit-stat-years" placeholder="3">
                </div>
                <div class="field-row">
                    <label>% Passion</label>
                    <input type="number" id="edit-stat-passion" placeholder="100">
                </div>
                <button id="save-stats-btn">Save Changes</button>
                <div id="save-stats-status"></div>
            </div>

            <div class="card">
                <h2>Projects</h2>
                <div class="field-row">
                    <label>Project 1 — Title</label>
                    <input type="text" id="edit-proj1-title" placeholder="AniCompanion">
                </div>
                <div class="field-row">
                    <label>Project 1 — Description</label>
                    <textarea id="edit-proj1-desc" placeholder="Short description"></textarea>
                </div>
                <div class="field-row">
                    <label>Project 1 — Tag</label>
                    <input type="text" id="edit-proj1-tag" placeholder="FLUTTER · GEMINI API">
                </div>
                <div class="field-row">
                    <label>Project 1 — Screenshot URL</label>
                    <input type="text" id="edit-proj1-image" placeholder="https://...jpg">
                </div>

                <div class="field-row" style="margin-top:20px;">
                    <label>Project 2 — Title</label>
                    <input type="text" id="edit-proj2-title" placeholder="AnimeExplorer">
                </div>
                <div class="field-row">
                    <label>Project 2 — Description</label>
                    <textarea id="edit-proj2-desc" placeholder="Short description"></textarea>
                </div>
                <div class="field-row">
                    <label>Project 2 — Tag</label>
                    <input type="text" id="edit-proj2-tag" placeholder="FIREBASE · JIKAN API">
                </div>
                <div class="field-row">
                    <label>Project 2 — Screenshot URL</label>
                    <input type="text" id="edit-proj2-image" placeholder="https://...jpg">
                </div>

                <div class="field-row" style="margin-top:20px;">
                    <label>Project 3 — Title</label>
                    <input type="text" id="edit-proj3-title" placeholder="Jarvis Assistant">
                </div>
                <div class="field-row">
                    <label>Project 3 — Description</label>
                    <textarea id="edit-proj3-desc" placeholder="Short description"></textarea>
                </div>
                <div class="field-row">
                    <label>Project 3 — Tag</label>
                    <input type="text" id="edit-proj3-tag" placeholder="PYTHON · GROQ">
                </div>
                <div class="field-row">
                    <label>Project 3 — Screenshot URL</label>
                    <input type="text" id="edit-proj3-image" placeholder="https://...jpg">
                </div>
                <button id="save-projects-btn">Save Changes</button>
                <div id="save-projects-status"></div>
            </div>

            <div class="card">
                <h2>Avatar</h2>
                <img class="avatar-preview" id="avatar-preview" src="" alt="">
                <div class="file-input-wrap">
                    <input type="file" id="avatar-file" accept="image/*">
                </div>
                <div class="upload-progress" id="avatar-status"></div>
            </div>

            <div class="card">
                <h2>Devlog</h2>
                <div id="devlog-list"></div>
                <button class="cms-add-btn" id="devlog-add-btn">+ Add Devlog Entry</button>
                <button id="save-devlog-btn" style="margin-top:14px;">Save Changes</button>
                <div id="save-devlog-status"></div>
            </div>

            <div class="card">
                <h2>Testimonials</h2>
                <div id="testimonials-list"></div>
                <button class="cms-add-btn" id="testimonial-add-btn">+ Add Testimonial</button>
                <button id="save-testimonials-btn" style="margin-top:14px;">Save Changes</button>
                <div id="save-testimonials-status"></div>
            </div>

            <div class="card">
                <h2>Messages</h2>
                <div class="msg-toolbar">
                    <input type="text" id="msg-search" placeholder="Search messages...">
                    <button id="export-csv-btn">Export CSV</button>
                </div>
                <div id="messages-list">
                    <div class="empty-note">Loading messages...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- FIREBASE CONFIG: use the SAME config as your main portfolio site ---
        const firebaseConfig = {
            apiKey: "AIzaSyDuBc6FPnsCpyaqrYkOY6OT-ZjWC-A0xl4",
            authDomain: "ptotfolio-y.firebaseapp.com",
            projectId: "ptotfolio-y",
            storageBucket: "ptotfolio-y.firebasestorage.app",
            messagingSenderId: "279786639458",
            appId: "1:279786639458:web:5fd6757bd25e3d7e8ac13b"
        };

        const configCheck = document.getElementById('config-check');
        let db = null, auth = null;

        if (firebaseConfig.apiKey === "YOUR_API_KEY") {
            configCheck.innerHTML = `<div class="config-warning">⚠ Firebase config not set. Open this file, find <code>firebaseConfig</code> near the bottom, and paste in your project's config (same one used in your main portfolio site).</div>`;
        } else {
            firebase.initializeApp(firebaseConfig);
            db = firebase.firestore();
            auth = firebase.auth();
        }

        const loginScreen = document.getElementById('login-screen');
        const dashboard = document.getElementById('dashboard');
        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const loginError = document.getElementById('login-error');
        const welcomeText = document.getElementById('welcome-text');

        if (loginBtn) {
            loginBtn.addEventListener('click', async () => {
                if (!auth) { loginError.textContent = 'Firebase not configured yet.'; return; }
                const email = document.getElementById('login-email').value;
                const password = document.getElementById('login-password').value;
                loginError.textContent = '';
                try {
                    await auth.signInWithEmailAndPassword(email, password);
                } catch (err) {
                    loginError.textContent = 'Login failed: ' + err.message;
                }
            });
        }

        if (logoutBtn) {
            logoutBtn.addEventListener('click', () => {
                if (auth) auth.signOut();
            });
        }

        const githubLoginBtn = document.getElementById('github-login-btn');
        if (githubLoginBtn) {
            githubLoginBtn.addEventListener('click', async () => {
                if (!auth) { loginError.textContent = 'Firebase not configured yet.'; return; }
                loginError.textContent = '';
                const provider = new firebase.auth.GithubAuthProvider();
                try {
                    await auth.signInWithPopup(provider);
                } catch (err) {
                    loginError.textContent = 'GitHub login failed: ' + err.message;
                }
            });
        }

        if (auth) {
            auth.onAuthStateChanged((user) => {
                if (user) {
                    loginScreen.style.display = 'none';
                    dashboard.style.display = 'block';
                    welcomeText.textContent = `Signed in as ${user.email}`;
                    loadStats();
                    loadProfile();
                    listenMessages();
                } else {
                    loginScreen.style.display = 'block';
                    dashboard.style.display = 'none';
                }
            });
        }

        // --- LOAD STATS ---
        async function loadStats() {
            if (!db) return;
            try {
                const visitorsDoc = await db.collection('stats').doc('visitors').get();
                document.getElementById('stat-visitors').textContent = visitorsDoc.exists ? (visitorsDoc.data().count || 0) : 0;
            } catch (e) { console.warn(e); }

            try {
                const msgSnap = await db.collection('messages').get();
                document.getElementById('stat-messages').textContent = msgSnap.size;
            } catch (e) { console.warn(e); }
        }

        // --- PROFILE EDITOR ---
        async function loadProfile() {
            if (!db) return;
            try {
                const doc = await db.collection('profile').doc('main').get();
                if (doc.exists) {
                    const data = doc.data();
                    document.getElementById('edit-name').value = data.name || '';
                    document.getElementById('edit-role').value = data.role || '';
                    document.getElementById('edit-about').value = data.about || '';
                    document.getElementById('edit-building').value = data.nowBuilding || '';

                    const links = data.links || {};
                    document.getElementById('edit-email').value = links.email || '';
                    document.getElementById('edit-github').value = links.github || '';
                    document.getElementById('edit-twitter').value = links.twitter || '';
                    document.getElementById('edit-instagram').value = links.instagram || '';

                    document.getElementById('edit-skills').value = (data.skills || []).join(', ');

                    const stats = data.stats || {};
                    document.getElementById('edit-stat-projects').value = stats.projects || '';
                    document.getElementById('edit-stat-years').value = stats.years || '';
                    document.getElementById('edit-stat-passion').value = stats.passion || '';

                    const projects = data.projects || [];
                    [1, 2, 3].forEach((n) => {
                        const p = projects[n - 1] || {};
                        document.getElementById(`edit-proj${n}-title`).value = p.title || '';
                        document.getElementById(`edit-proj${n}-desc`).value = p.desc || '';
                        document.getElementById(`edit-proj${n}-tag`).value = p.tag || '';
                        document.getElementById(`edit-proj${n}-image`).value = p.image || '';
                    });

                    const avatarPreview = document.getElementById('avatar-preview');
                    if (avatarPreview && data.avatarUrl) avatarPreview.src = data.avatarUrl;

                    renderDevlogList(data.devlog || []);
                    renderTestimonialsList(data.testimonials || []);
                }
            } catch (e) { console.warn(e); }
        }

        const saveBtn = document.getElementById('save-profile-btn');
        const saveStatus = document.getElementById('save-status');
        if (saveBtn) {
            saveBtn.addEventListener('click', async () => {
                if (!db) { saveStatus.style.color = '#ef4444'; saveStatus.textContent = 'Firebase not configured.'; return; }
                saveBtn.disabled = true;
                saveStatus.style.color = '#4ade80';
                saveStatus.textContent = 'Saving...';
                try {
                    await db.collection('profile').doc('main').set({
                        name: document.getElementById('edit-name').value,
                        role: document.getElementById('edit-role').value,
                        about: document.getElementById('edit-about').value,
                        nowBuilding: document.getElementById('edit-building').value,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    }, { merge: true });
                    saveStatus.textContent = 'Saved! Live site will update on next load.';
                } catch (e) {
                    saveStatus.style.color = '#ef4444';
                    saveStatus.textContent = 'Save failed: ' + e.message;
                }
                saveBtn.disabled = false;
                setTimeout(() => { saveStatus.textContent = ''; }, 4000);
            });
        }

        // --- helper for the other save sections ---
        function wireSave(btnId, statusId, buildPayload) {
            const btn = document.getElementById(btnId);
            const status = document.getElementById(statusId);
            if (!btn) return;
            btn.addEventListener('click', async () => {
                if (!db) { status.style.color = '#ef4444'; status.textContent = 'Firebase not configured.'; return; }
                btn.disabled = true;
                status.style.color = '#4ade80';
                status.textContent = 'Saving...';
                try {
                    await db.collection('profile').doc('main').set({
                        ...buildPayload(),
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    }, { merge: true });
                    status.textContent = 'Saved! Live site will update on next load.';
                } catch (e) {
                    status.style.color = '#ef4444';
                    status.textContent = 'Save failed: ' + e.message;
                }
                btn.disabled = false;
                setTimeout(() => { status.textContent = ''; }, 4000);
            });
        }

        wireSave('save-links-btn', 'save-links-status', () => ({
            links: {
                email: document.getElementById('edit-email').value,
                github: document.getElementById('edit-github').value,
                twitter: document.getElementById('edit-twitter').value,
                instagram: document.getElementById('edit-instagram').value
            }
        }));

        wireSave('save-skills-btn', 'save-skills-status', () => ({
            skills: document.getElementById('edit-skills').value
                .split(',').map(s => s.trim()).filter(Boolean)
        }));

        wireSave('save-stats-btn', 'save-stats-status', () => ({
            stats: {
                projects: parseInt(document.getElementById('edit-stat-projects').value, 10) || 0,
                years: parseInt(document.getElementById('edit-stat-years').value, 10) || 0,
                passion: parseInt(document.getElementById('edit-stat-passion').value, 10) || 0
            }
        }));

        wireSave('save-projects-btn', 'save-projects-status', () => ({
            projects: [1, 2, 3].map((n) => ({
                title: document.getElementById(`edit-proj${n}-title`).value,
                desc: document.getElementById(`edit-proj${n}-desc`).value,
                tag: document.getElementById(`edit-proj${n}-tag`).value,
                image: document.getElementById(`edit-proj${n}-image`).value
            }))
        }));

        // --- MESSAGES LIST (real-time, with search/export/reply/unread) ---
        let allMessages = [];

        function renderMessages(filterText) {
            const list = document.getElementById('messages-list');
            const filtered = !filterText ? allMessages : allMessages.filter(m => {
                const t = filterText.toLowerCase();
                return (m.name || '').toLowerCase().includes(t) ||
                       (m.email || '').toLowerCase().includes(t) ||
                       (m.message || '').toLowerCase().includes(t);
            });

            if (filtered.length === 0) {
                list.innerHTML = '<div class="empty-note">No messages found.</div>';
                return;
            }

            list.innerHTML = '';
            filtered.forEach((m) => {
                const date = m.createdAt ? m.createdAt.toDate().toLocaleString() : 'Just now';
                const subject = encodeURIComponent(`Re: your message`);
                const body = encodeURIComponent(`Hi ${m.name || ''},\n\n`);
                const item = document.createElement('div');
                item.className = 'msg-item';
                item.innerHTML = `
                    <div>
                        <div class="msg-name">${m.unread ? '<span class="msg-unread-dot"></span>' : ''}${escapeHtml(m.name || 'Unknown')}</div>
                        <div class="msg-email">${escapeHtml(m.email || '')}</div>
                        <div class="msg-text">${escapeHtml(m.message || '')}</div>
                        <div class="msg-date">${date}</div>
                    </div>
                    <div class="msg-actions">
                        <button class="msg-reply" onclick="window.location.href='mailto:${escapeHtml(m.email || '')}?subject=${subject}&body=${body}'">Reply</button>
                        <button class="msg-delete" data-id="${m.id}">Delete</button>
                    </div>
                `;
                list.appendChild(item);
            });

            list.querySelectorAll('.msg-delete').forEach(btn => {
                btn.addEventListener('click', async () => {
                    if (!confirm('Delete this message?')) return;
                    await db.collection('messages').doc(btn.getAttribute('data-id')).delete();
                });
            });
        }

        function listenMessages() {
            if (!db) return;
            let firstLoad = true;
            db.collection('messages').orderBy('createdAt', 'desc').onSnapshot((snapshot) => {
                allMessages = snapshot.docs.map(d => ({ id: d.id, unread: firstLoad ? false : true, ...d.data() }));
                document.getElementById('stat-messages').textContent = snapshot.size;
                renderMessages(document.getElementById('msg-search').value);

                if (!firstLoad && Notification && Notification.permission === 'granted') {
                    new Notification('New portfolio message received');
                }
                firstLoad = false;
            });
        }

        const msgSearchInput = document.getElementById('msg-search');
        if (msgSearchInput) {
            msgSearchInput.addEventListener('input', (e) => renderMessages(e.target.value));
        }

        const exportCsvBtn = document.getElementById('export-csv-btn');
        if (exportCsvBtn) {
            exportCsvBtn.addEventListener('click', () => {
                if (!allMessages.length) return;
                const rows = [['Name', 'Email', 'Message', 'Date']];
                allMessages.forEach(m => {
                    const date = m.createdAt ? m.createdAt.toDate().toISOString() : '';
                    rows.push([m.name || '', m.email || '', (m.message || '').replace(/\n/g, ' '), date]);
                });
                const csv = rows.map(r => r.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',')).join('\n');
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'portfolio-messages.csv';
                a.click();
                URL.revokeObjectURL(url);
            });
        }

        if (window.Notification && Notification.permission === 'default') {
            Notification.requestPermission();
        }

        // --- AVATAR UPLOAD (via imgbb) ---
        // Get a free API key at https://api.imgbb.com/ and paste it below
        const IMGBB_API_KEY = "eab281e4cee2c8c755ed3f7594fd120b";

        const avatarFile = document.getElementById('avatar-file');
        const avatarStatus = document.getElementById('avatar-status');
        const avatarPreviewEl = document.getElementById('avatar-preview');
        if (avatarFile) {
            avatarFile.addEventListener('change', async () => {
                const file = avatarFile.files[0];
                if (!file || !db) return;

                if (!IMGBB_API_KEY || IMGBB_API_KEY === "YOUR_IMGBB_API_KEY") {
                    avatarStatus.style.color = '#ef4444';
                    avatarStatus.textContent = 'Add your imgbb API key in the admin panel code first.';
                    return;
                }

                avatarStatus.style.color = '#b5893d';
                avatarStatus.textContent = 'Uploading...';
                try {
                    const formData = new FormData();
                    formData.append('image', file);
                    const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                        method: 'POST',
                        body: formData
                    });
                    const json = await res.json();
                    if (!json.success) throw new Error((json.error && json.error.message) || 'Upload failed');
                    const url = json.data.url;
                    if (avatarPreviewEl) avatarPreviewEl.src = url;
                    await db.collection('profile').doc('main').set({ avatarUrl: url }, { merge: true });
                    avatarStatus.style.color = '#4ade80';
                    avatarStatus.textContent = 'Uploaded! Live site will use this on next load.';
                } catch (e) {
                    avatarStatus.style.color = '#ef4444';
                    avatarStatus.textContent = 'Upload failed: ' + e.message;
                }
                setTimeout(() => { avatarStatus.textContent = ''; }, 4000);
            });
        }

        // --- DEVLOG CMS ---
        function renderDevlogList(entries) {
            const wrap = document.getElementById('devlog-list');
            if (!wrap) return;
            wrap.innerHTML = '';
            entries.forEach((entry, i) => {
                const item = document.createElement('div');
                item.className = 'cms-list-item';
                item.innerHTML = `
                    <div class="field-row">
                        <label>Date</label>
                        <input type="text" class="devlog-date-input" value="${escapeAttr(entry.date || '')}" placeholder="JUL 12">
                    </div>
                    <div class="field-row">
                        <label>Entry</label>
                        <textarea class="devlog-text-input" placeholder="What did you ship?">${escapeHtml(entry.text || '')}</textarea>
                    </div>
                    <button class="cms-remove-btn" data-index="${i}">Remove</button>
                `;
                wrap.appendChild(item);
            });
            wrap.querySelectorAll('.cms-remove-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    entries.splice(parseInt(btn.getAttribute('data-index'), 10), 1);
                    renderDevlogList(entries);
                });
            });
            wrap.dataset.entries = JSON.stringify(entries);
        }

        const devlogAddBtn = document.getElementById('devlog-add-btn');
        if (devlogAddBtn) {
            devlogAddBtn.addEventListener('click', () => {
                const wrap = document.getElementById('devlog-list');
                const current = JSON.parse(wrap.dataset.entries || '[]');
                current.unshift({ date: '', text: '' });
                renderDevlogList(current);
            });
        }

        wireSave('save-devlog-btn', 'save-devlog-status', () => {
            const wrap = document.getElementById('devlog-list');
            const dates = wrap.querySelectorAll('.devlog-date-input');
            const texts = wrap.querySelectorAll('.devlog-text-input');
            const devlog = [];
            dates.forEach((d, i) => devlog.push({ date: d.value, text: texts[i].value }));
            return { devlog };
        });

        // --- TESTIMONIALS CMS ---
        function renderTestimonialsList(entries) {
            const wrap = document.getElementById('testimonials-list');
            if (!wrap) return;
            wrap.innerHTML = '';
            entries.forEach((entry, i) => {
                const item = document.createElement('div');
                item.className = 'cms-list-item';
                item.innerHTML = `
                    <div class="field-row">
                        <label>Quote</label>
                        <textarea class="testimonial-quote-input" placeholder="What did they say?">${escapeHtml(entry.quote || '')}</textarea>
                    </div>
                    <div class="field-row">
                        <label>Author</label>
                        <input type="text" class="testimonial-author-input" value="${escapeAttr(entry.author || '')}" placeholder="— A fellow dev">
                    </div>
                    <button class="cms-remove-btn" data-index="${i}">Remove</button>
                `;
                wrap.appendChild(item);
            });
            wrap.querySelectorAll('.cms-remove-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    entries.splice(parseInt(btn.getAttribute('data-index'), 10), 1);
                    renderTestimonialsList(entries);
                });
            });
            wrap.dataset.entries = JSON.stringify(entries);
        }

        const testimonialAddBtn = document.getElementById('testimonial-add-btn');
        if (testimonialAddBtn) {
            testimonialAddBtn.addEventListener('click', () => {
                const wrap = document.getElementById('testimonials-list');
                const current = JSON.parse(wrap.dataset.entries || '[]');
                current.push({ quote: '', author: '' });
                renderTestimonialsList(current);
            });
        }

        wireSave('save-testimonials-btn', 'save-testimonials-status', () => {
            const wrap = document.getElementById('testimonials-list');
            const quotes = wrap.querySelectorAll('.testimonial-quote-input');
            const authors = wrap.querySelectorAll('.testimonial-author-input');
            const testimonials = [];
            quotes.forEach((q, i) => testimonials.push({ quote: q.value, author: authors[i].value }));
            return { testimonials };
        });

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str || '';
            return div.innerHTML;
        }

        function escapeAttr(str) {
            return (str || '').replace(/"/g, '&quot;');
        }
    </script>
</body>
</html>
